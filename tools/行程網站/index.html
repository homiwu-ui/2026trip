// ============ RENDER ============
const grid = document.getElementById('dayGrid');
const wrap = document.getElementById('detailWrap');

D.forEach(d => {
  const card = document.createElement('div');
  card.className = 'day-card';
  card.innerHTML = '<div class="day-emoji">'+d.emo+'</div><div class="day-number">DAY '+d.day+'</div><h3>'+d.title+'｜'+d.sub+'</h3><div class="day-region">📍 '+d.region+'</div><div class="day-desc">'+d.sum+'</div>';
  card.onclick = function(){showDay(d.day)};
  grid.appendChild(card);

  // build images for attr
  var imgs = '';
  d.attr.forEach(function(a,i){
    imgs += '<img class="cimg'+(i===0?' on':'')+'" src="'+a[3]+'" data-i="'+i+'" style="display:'+(i===0?'block':'none')+';width:100%;height:280px;object-fit:cover;border-radius:10px">';
  });
  var btns = d.attr.length>1 ? '<button class="cbp" onclick="cmove('+d.day+',-1)">&#139;</button><button class="cbn" onclick="cmove('+d.day+',1)">&#155;</button>' : '';
  var carousel = '<div style="position:relative;margin-bottom:16px">'+imgs+btns+'</div>';

  var attrHTML = '';
  d.attr.forEach(function(a){
    attrHTML += '<div class="attraction-item"><h3>&#128205; '+a[0]+'</h3><p>'+a[1]+'</p>'+(a[2]?'<div class="tip">&#128161; '+a[2]+'</div>':'')+'</div>';
  });

  var foodHTML = '';
  d.food.forEach(function(f){
    foodHTML += '<div class="food-card"><div class="food-type">'+f[1]+'</div><h4>'+f[0]+'</h4><div class="food-recommend">&#128077; '+f[2]+'</div><div class="food-price">💰 '+f[3]+'</div></div>';
  });

  var schedHTML = '';
  d.schedule.forEach(function(s){
    schedHTML += '<div class="timeline-item"><div class="time">'+s[0]+'</div><div class="activity">'+s[1]+'</div>'+(s[2]?'<div class="note">'+s[2]+'</div>':'')+'</div>';
  });

  var transHTML = '';
  d.trans.forEach(function(t){
    transHTML += '<div class="transport-item"><span class="mode">'+t[0]+'</span><span>'+t[1]+'</span></div>';
  });

  var tipsHTML = '';
  d.tips.forEach(function(t){
    tipsHTML += '<li>'+t+'</li>';
  });

  var highlights = '';
  d.high.forEach(function(h){
    highlights += '<li style="margin-bottom:6px">'+h+'</li>';
  });

  var detailDiv = document.createElement('div');
  detailDiv.className = 'detail-wrap';
  detailDiv.id = 'd'+d.day;
  detailDiv.innerHTML = '<div class="detail-header"><div class="detail-header-bg"><img src="'+d.attr[0][3]+'"></div><div class="detail-header-content"><button class="back-btn" onclick="backOverview()">&#8592; 回到行程總覽</button><h1>Day '+d.day+' &#183; '+d.title+'</h1><div class="detail-date">📅 '+d.date+' ('+d.dw+') '+d.emo+'</div></div></div><div class="detail-body"><div class="info-card"><h2>&#127775; 今日重點</h2><ul style="padding-left:20px">'+highlights+'</ul></div><div class="info-card"><h2>&#9200; 行程時間表</h2><div class="timeline">'+schedHTML+'</div></div><div class="info-card"><h2>&#128652; 交通資訊</h2>'+transHTML+'</div><div class="info-card"><h2>&#127963;&#65039; 景點介紹</h2>'+carousel+attrHTML+'</div><div class="info-card"><h2>&#127837; 美食推薦</h2><div class="food-grid">'+foodHTML+'</div></div><div class="info-card"><h2>&#127968; 住宿資訊</h2><div class="hotel-card"><div style="font-size:1.8rem">&#127968;</div><div><h3>'+d.hotel+'</h3></div></div></div><div class="info-card"><h2>&#128161; 注意事項</h2><ul class="tips-list">'+tipsHTML+'</ul></div><div class="info-card"><h2>&#128506; 地圖</h2><div class="map-wrap"><iframe src="'+d.map+'" loading="lazy" allowfullscreen></iframe></div></div></div>';
  wrap.appendChild(detailDiv);
});

function showDay(n){
  document.querySelectorAll('.detail-wrap').forEach(function(e){e.classList.remove('show')});
  var el = document.getElementById('d'+n);
  if(el){el.classList.add('show');setTimeout(function(){el.scrollIntoView({behavior:'smooth'})},50)}
}

function backOverview(){
  document.querySelectorAll('.detail-wrap').forEach(function(e){e.classList.remove('show')});
  document.getElementById('overview').scrollIntoView({behavior:'smooth'});
}

function goHome(){
  document.querySelectorAll('.detail-wrap').forEach(function(e){e.classList.remove('show')});
  window.scrollTo({top:0,behavior:'smooth'});
}

function goOverview(){
  document.querySelectorAll('.detail-wrap').forEach(function(e){e.classList.remove('show')});
  document.getElementById('overview').scrollIntoView({behavior:'smooth'});
}

function cmove(n,dir){
  var wrap = document.getElementById('d'+n);
  var imgs = wrap.querySelectorAll('.cimg');
  var cur = wrap.querySelector('.cimg.on');
  var idx = parseInt(cur.getAttribute('data-i'));
  cur.classList.remove('on');
  cur.style.display = 'none';
  var next = (idx + dir + imgs.length) % imgs.length;
  imgs[next].classList.add('on');
  imgs[next].style.display = 'block';
}

// back to top
window.addEventListener('scroll',function(){
  var btn = document.getElementById('topBtn');
  if(window.scrollY>300)btn.classList.add('show');else btn.classList.remove('show');
});
</script>
